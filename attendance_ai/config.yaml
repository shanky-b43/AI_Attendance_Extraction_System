paths:
  input_pdfs: "input/pdfs"
  input_images: "input/images"
  output_excel: "output/excel"
  output_logs: "output/logs"
  output_debug: "output/debug"
  output_crops: "output/crops"
  models: "models"

attendance_rules:
  present_text:
    - "P"
    - "p"
    - "D"
    - "d"
  absent_text:
    - "A"
    - "a"
    - "AB"
    - "ab"
  blank: "Absent"
  handwritten_signature: "Present"
  black_box: "Absent"

ocr:
  confidence_threshold: 0.90
  lang: "en"
  use_gpu: false

app:
  debug_mode: true
  use_vision_api: true
  vision_provider: "openrouter"       # "openrouter" or "gemini"
  vision_model: "google/gemma-4-31b-it:free"     # Gemma 4 31B (free tier on OpenRouter)
